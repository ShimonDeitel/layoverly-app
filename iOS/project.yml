name: Layoverly
options:
  bundleIdPrefix: com.shimondeitel.layover
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Layoverly:
    type: application
    platform: iOS
    sources:
      - path: Layoverly
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.layover
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Layoverly/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  LayoverlyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: LayoverlyTests
      - path: Layoverly.storekit
    dependencies:
      - target: Layoverly
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.layover.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  LayoverlyUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: LayoverlyUITests
    dependencies:
      - target: Layoverly
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.layover.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Layoverly:
    build:
      targets:
        Layoverly: all
        LayoverlyTests: [test]
        LayoverlyUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Layoverly.storekit
    test:
      config: Debug
      storeKitConfiguration: Layoverly.storekit
      targets:
        - LayoverlyTests
        - LayoverlyUITests
    archive:
      config: Release
